services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GTS_API_HOST: 0.0.0.0
      GTS_API_PORT: 8000
      GTS_DB_PATH: /app/runtime/gatetrack_sentinel.db
      GTS_MODEL_MODE: adk
      GTS_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - gts_runtime:/app/runtime

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  gts_runtime:
